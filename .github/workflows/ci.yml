name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust-quality:
    name: Rust quality
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      # Formatting is the one tracked quality-gate exception while the repo-wide
      # fmt sweep is in flight; warnings are blocking below.
      - name: Check formatting
        continue-on-error: true
        run: cargo fmt --all -- --check

      # Rust warnings are errors: clippy is blocking for every pure/offline crate.
      # To add a crate, first confirm its normal+dev dependency tree contains no
      # ort-sys/CUDA dependency, then add it here and to the portable test lane.
      # mlas-sys is Linux-only, which is fine in this ubuntu quality job.
      - name: Run clippy on all offline crates
        run: >-
          cargo clippy --locked --all-targets
          -p onnx-genai-comfyui-config
          -p onnx-genai-metadata
          -p onnx-genai-genai-config
          -p onnx-genai-kv
          -p onnx-genai-runtime-config
          -p onnx-genai-scheduler
          -p onnx-runtime-protocol-trace
          -p mlas-sys
          -p onnx-runtime-ep-api
          -p onnx-runtime-ep-cpu
          -p onnx-runtime-ir
          -p onnx-runtime-optimizer
          -p onnx-runtime-loader
          -p onnx-runtime-shape-inference
          -p onnx-runtime-quantization
          -p onnx-runtime-tracer
          -p onnx-runtime-session
          -p onnx-genai-preprocess
          -p onnx-std
          -p onnx-genai-router
          -p onnx-runtime-memory
          -p onnx-runtime-cpuinfo
          -p onnx-runtime-eager
          -p onnx-runtime-capi
          -p onnx-runtime-dlpack
          -p onnx-runtime-comm
          -p onnx-std-python
          -- -D warnings

  rust-portable:
    name: Rust (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
          - name: Windows x86_64
            os: windows-latest
          # Native GitHub-hosted Windows 11 ARM64 runner.
          - name: Windows ARM64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
          # macos-latest is the standard GitHub-hosted Apple Silicon runner.
          - name: macOS arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      # rustc warnings are errors on every portable test build and the Windows
      # ARM64 clippy gate, including the Linux-only mlas-sys step below.
      RUSTFLAGS: "-D warnings"

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python test dependencies
        run: python -m pip install --upgrade numpy onnxscript

      # Never replace these explicit packages with bare `cargo test` or
      # `--workspace`: that selects onnx-genai-ort-sys, whose build script
      # downloads a native ONNX Runtime distribution. Add a crate here only
      # after `cargo tree -p <crate> -e normal,dev` confirms no ort-sys,
      # onnx-runtime-ep-cuda, or cudarc dependency. CUDA tests stay compile-only
      # below because GitHub-hosted runners have no GPU.
      - name: Test cross-platform offline crates
        run: >-
          cargo test --locked
          -p onnx-genai-comfyui-config
          -p onnx-genai-metadata
          -p onnx-genai-genai-config
          -p onnx-genai-kv
          -p onnx-genai-runtime-config
          -p onnx-genai-scheduler
          -p onnx-runtime-protocol-trace
          -p onnx-runtime-ir
          -p onnx-runtime-ep-api
          -p onnx-runtime-ep-cpu
          -p onnx-runtime-loader
          -p onnx-runtime-shape-inference
          -p onnx-runtime-optimizer
          -p onnx-runtime-quantization
          -p onnx-runtime-session
          -p onnx-runtime-tracer
          -p onnx-genai-preprocess
          -p onnx-std
          -p onnx-genai-router
          -p onnx-runtime-memory
          -p onnx-runtime-cpuinfo
          -p onnx-runtime-eager
          -p onnx-runtime-capi
          -p onnx-runtime-dlpack
          -p onnx-runtime-comm
          -p onnx-std-python

      - name: Clippy Windows ARM64 offline crates
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: >-
          cargo clippy --locked --all-targets
          --target aarch64-pc-windows-msvc
          -p onnx-genai-comfyui-config
          -p onnx-genai-metadata
          -p onnx-genai-genai-config
          -p onnx-genai-kv
          -p onnx-genai-runtime-config
          -p onnx-genai-scheduler
          -p onnx-runtime-protocol-trace
          -p onnx-runtime-ir
          -p onnx-runtime-ep-api
          -p onnx-runtime-ep-cpu
          -p onnx-runtime-loader
          -p onnx-runtime-shape-inference
          -p onnx-runtime-optimizer
          -p onnx-runtime-quantization
          -p onnx-runtime-session
          -p onnx-runtime-tracer
          -p onnx-genai-preprocess
          -p onnx-std
          -p onnx-genai-router
          -p onnx-runtime-memory
          -p onnx-runtime-cpuinfo
          -p onnx-runtime-eager
          -p onnx-runtime-capi
          -p onnx-runtime-dlpack
          -p onnx-runtime-comm
          -p onnx-std-python
          -- -D warnings

      # The vendored MLAS feasibility spike is offline, but its build script is
      # intentionally x86_64 Linux-only (GAS assembly and Linux headers).
      - name: Test Linux-only offline crates
        if: runner.os == 'Linux'
        run: cargo test --locked -p mlas-sys

  coverage:
    name: Rust coverage
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python test dependencies
        run: python -m pip install --upgrade numpy onnxscript
      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Collect Rust coverage
        run: >-
          cargo llvm-cov --locked --codecov --output-path codecov.json
          -p onnx-genai-comfyui-config
          -p onnx-genai-metadata
          -p onnx-genai-genai-config
          -p onnx-genai-kv
          -p onnx-genai-runtime-config
          -p onnx-genai-scheduler
          -p onnx-runtime-protocol-trace
          -p onnx-runtime-ir
          -p onnx-runtime-ep-api
          -p onnx-runtime-ep-cpu
          -p mlas-sys
          -p onnx-runtime-loader
          -p onnx-std
          -p onnx-runtime-shape-inference
          -p onnx-runtime-optimizer
          -p onnx-runtime-quantization
          -p onnx-runtime-session
          -p onnx-runtime-tracer
          -p onnx-genai-preprocess
          -p onnx-genai-router
          -p onnx-runtime-memory
          -p onnx-runtime-cpuinfo
          -p onnx-runtime-eager
          -p onnx-runtime-capi
          -p onnx-runtime-dlpack
          -p onnx-runtime-comm
          -p onnx-std-python

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: codecov.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  cuda-compile:
    name: CUDA compile (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
          - name: Windows x86_64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # CUDA uses dynamic loading, so compile coverage needs no GPU or toolkit,
      # but ep-cuda tests require a CUDA runtime/GPU and must not join the
      # portable test lane. This lane intentionally excludes macOS, where CUDA
      # is unsupported. ORT-linked crates also stay out of portable tests because
      # onnx-genai-ort-sys downloads native ORT; onnx-runtime-python's feature
      # check here provides compile coverage for that integration path.
      - name: Check CUDA execution provider and Python feature
        run: >-
          cargo check --locked
          -p onnx-runtime-ep-cuda
          -p onnx-runtime-python
          --features onnx-runtime-python/cuda
