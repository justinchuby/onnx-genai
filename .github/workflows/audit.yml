name: Rust security audit

on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "**/Cargo.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Check RustSec advisories
        # Default cargo-audit policy fails on vulnerabilities but allows
        # informational warnings such as unmaintained transitive crates.
        run: cargo audit
