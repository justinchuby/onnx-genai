name: Publish crates

on:
  workflow_dispatch:
    inputs:
      publish_crates:
        description: Publish workspace crates to crates.io
        required: false
        type: boolean
        default: false
      publish_pypi:
        description: Publish the nxrt source distribution to PyPI
        required: false
        type: boolean
        default: false
      publish_onnx_genai:
        description: Publish the onnx-genai placeholder to PyPI
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_crates)
    runs-on: ubuntu-latest
    environment: crates
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish workspace crates in dependency order
        shell: bash
        run: |
          set -euo pipefail

          crate_version() {
            local crate="$1"
            cargo metadata --no-deps --format-version 1 |
              python3 -c 'import json,sys; p=[x for x in json.load(sys.stdin)["packages"] if x["name"]==sys.argv[1]]; print(p[0]["version"] if p else "")' "$crate"
          }

          crate_exists() {
            local crate="$1"
            local version
            version="$(crate_version "$crate")"
            if [[ -z "$version" ]]; then
              echo "Failed to resolve the workspace version for $crate." >&2
              exit 1
            fi

            # crates.io returns 403 without a User-Agent, so the guard MUST send one.
            curl --fail --silent --show-error \
              -H "User-Agent: onnx-genai-publish (github-actions; justinchuby/onnx-genai)" \
              "https://crates.io/api/v1/crates/$crate/$version" >/dev/null 2>&1
          }

          publish_crate() {
            local crate="$1"
            local version
            local attempt
            local failures=0
            local rate_limit_waits=0
            local retry_after
            local target
            local now
            local wait_s

            version="$(crate_version "$crate")"
            if [[ -z "$version" ]]; then
              echo "Failed to resolve the workspace version for $crate." >&2
              return 1
            fi

            if crate_exists "$crate"; then
              echo "$crate $version is already published; skipping."
              return
            fi

            while [[ "$failures" -lt 6 ]]; do
              attempt=$((failures + 1))
              echo "Publishing $crate $version (attempt $attempt/6)"
              if out="$(cargo publish --locked -p "$crate" 2>&1)"; then
                echo "$out"
                sleep 30
                return
              fi
              echo "$out"

              # Idempotent: an already-published version is success, not failure.
              if echo "$out" | grep -qiE "already (exists|uploaded)"; then
                echo "$crate $version already exists on crates.io; skipping."
                return
              fi

              if crate_exists "$crate"; then
                echo "$crate $version became available after the publish attempt."
                sleep 30
                return
              fi

              if echo "$out" | grep -qiE "too many|rate.?limit|status 429"; then
                if [[ "$rate_limit_waits" -ge 6 ]]; then
                  echo "Failed to publish $crate $version after 6 rate-limit waits." >&2
                  return 1
                fi
                rate_limit_waits=$((rate_limit_waits + 1))
                retry_after="$(printf '%s' "$out" | sed -n 's/.*try again after \(.*\) and see.*/\1/p' | head -1)"
                if [[ -z "$retry_after" ]]; then
                  retry_after="$(printf '%s' "$out" | sed -n 's/.*try again after \([^.]*\)\..*/\1/p' | head -1)"
                fi
                target="$(date -u -d "$retry_after" +%s 2>/dev/null || echo 0)"
                now="$(date -u +%s)"
                if (( target > now )); then
                  wait_s=$((target - now + 20))
                  if (( wait_s > 1800 )); then
                    wait_s=1800
                  fi
                  echo "Rate limited; sleeping ${wait_s}s until ${retry_after} before retrying $crate."
                else
                  wait_s=120
                  echo "Rate limited; could not parse retry time; sleeping ${wait_s}s before retrying $crate."
                fi
                sleep "$wait_s"
                continue
              fi

              failures=$((failures + 1))
              if [[ "$failures" -lt 6 ]]; then
                echo "Publish failed; waiting for the crates.io index before retrying."
                sleep 30
              fi
            done

            echo "Failed to publish $crate $version after 6 attempts." >&2
            return 1
          }

          publish_crate onnx-runtime-ir
          publish_crate onnx-runtime-shape-inference
          publish_crate onnx-runtime-loader
          publish_crate onnx-rs
          publish_crate onnx-runtime-ep-api
          publish_crate onnx-runtime-ep-cpu
          publish_crate onnx-runtime-optimizer
          publish_crate onnx-runtime-session
          publish_crate onnx-runtime-capi
          publish_crate onnx-runtime-cpuinfo
          publish_crate onnx-runtime-eager
          publish_crate onnx-runtime-ep-cuda
          publish_crate onnx-runtime-memory
          publish_crate onnx-runtime-tracer

          publish_crate onnx-genai-metadata
          publish_crate onnx-genai-ort-sys
          publish_crate onnx-genai-runtime-config
          publish_crate onnx-genai-preprocess
          publish_crate onnx-genai-router
          publish_crate onnx-genai-genai-config
          publish_crate onnx-genai-comfyui-config
          publish_crate onnx-genai-kv
          publish_crate onnx-genai-scheduler
          publish_crate onnx-genai-ort
          publish_crate onnx-genai-engine
          publish_crate onnx-genai
          publish_crate onnx-genai-server


  publish-pypi-sdist:
    name: Publish nxrt sdist to PyPI
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_pypi)
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: pip install maturin
      - name: Build nxrt source distribution
        run: maturin sdist --manifest-path crates/onnx-runtime-python/Cargo.toml --out dist
      - name: Publish nxrt source distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-onnx-genai-sdist:
    name: Publish onnx-genai placeholder to PyPI
    if: github.event_name == 'workflow_dispatch' && inputs.publish_onnx_genai
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install build
        run: pip install build
      - name: Build onnx-genai source distribution
        run: python -m build --sdist python/onnx-genai --outdir dist
      - name: Publish onnx-genai source distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
