[package]
name = "onnx-runtime-session"
description = "Session and inference API for the ORT 2.0 runtime: intent-based SessionBuilder and sequential executor (skeleton)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
keywords = ["onnx", "session", "inference", "runtime"]
categories = ["science", "api-bindings"]

[features]
default = []
cuda = ["dep:onnx-runtime-ep-cuda"]
mlas = ["onnx-runtime-ep-cpu/mlas"]

[dependencies]
onnx-genai-runtime-config = { workspace = true }
onnx-runtime-ir = { workspace = true }
onnx-runtime-loader = { workspace = true }
onnx-runtime-shape-inference = { workspace = true }
onnx-runtime-optimizer = { workspace = true }
onnx-runtime-ep-api = { workspace = true }
onnx-runtime-ep-cpu = { workspace = true }
onnx-runtime-ep-cuda = { workspace = true, optional = true }
onnx-runtime-tracer = { workspace = true }
thiserror = { workspace = true }
half = "2"

[dev-dependencies]
prost = "0.13"
