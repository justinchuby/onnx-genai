domain: ""
name: Clip
since_version: 13
doc: Clamp tensor elements between optional scalar bounds.
inputs:
  - { name: input, type_str: T }
  - { name: min, type_str: T, optional: true }
  - { name: max, type_str: T, optional: true }
outputs:
  - { name: output, type_str: T }
type_constraints:
  - { type_param: T, allowed: [uint8, uint16, uint32, uint64, int8, int16, int32, int64, float16, float32, float64, bfloat16] }
