domain: ""
name: GatherElements
since_version: 13
doc: Gather elements from a tensor using an indices tensor of the same rank.
attributes:
  - { name: axis, type: int, default: 0 }
inputs:
  - { name: data, type_str: T }
  - { name: indices, type_str: Tind }
outputs:
  - { name: output, type_str: T }
type_constraints:
  - { type_param: T, allowed: [uint8, uint16, uint32, uint64, int8, int16, int32, int64, bfloat16, float16, float32, float64, string, bool, complex64, complex128] }
  - { type_param: Tind, allowed: [int32, int64] }
