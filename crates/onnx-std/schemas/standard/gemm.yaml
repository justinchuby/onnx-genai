domain: ""
name: Gemm
since_version: 13
doc: General matrix multiplication.
attributes:
  - { name: alpha, type: float, default: 1.0 }
  - { name: beta, type: float, default: 1.0 }
  - { name: transA, type: int, default: 0 }
  - { name: transB, type: int, default: 0 }
inputs:
  - { name: A, type_str: T }
  - { name: B, type_str: T }
  - { name: C, type_str: T, optional: true }
outputs:
  - { name: Y, type_str: T }
type_constraints:
  - type_param: T
    allowed: [float16, float32, float64, bfloat16, uint32, uint64, int32, int64]
