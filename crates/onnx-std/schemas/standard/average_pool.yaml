domain: ""
name: AveragePool
since_version: 22
doc: Apply average pooling across the spatial dimensions.
attributes:
  - { name: kernel_shape, type: ints, required: true }
  - { name: strides, type: ints }
  - { name: auto_pad, type: string, default: NOTSET }
  - { name: pads, type: ints }
  - { name: ceil_mode, type: int, default: 0 }
  - { name: dilations, type: ints }
  - { name: count_include_pad, type: int, default: 0 }
inputs:
  - { name: X, type_str: T }
outputs:
  - { name: Y, type_str: T }
type_constraints:
  - { type_param: T, allowed: [bfloat16, float16, float32, float64] }
