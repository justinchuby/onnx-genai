[package]
name = "onnx-runtime-tracer"
description = "Unified, pure-Rust tracing for the ORT 2.0 runtime: a TraceCollector fan-out architecture (Noop/Memory/File/Composite) exporting Chrome Trace JSON, JSONL, and Perfetto protobuf for Perfetto / chrome://tracing"
version = "0.1.0-dev.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
keywords = ["onnx", "tracing", "profiling", "perfetto", "chrome-trace"]
categories = ["development-tools::profiling", "science"]

[features]
# Perfetto protobuf export is on by default — Perfetto is the primary viewer
# (§48.6/§48.7) and `prost` is a small, pure-Rust dependency.
default = ["perfetto"]
# Real optional dependency: Perfetto native protobuf serialization via `prost`
# (§48.8.6). Implemented in `src/perfetto.rs`.
perfetto = ["dep:prost"]
# Chrome Trace JSON — always available with no extra dependency. The feature
# exists so the backend can be named/selected uniformly (§48.8.4/§48.8.6); the
# `chrome` module is compiled unconditionally.
chrome = []
# Intel ITT (VTune/Inspector) backend (§48.8.2). Bridges TraceEvents into Intel
# ITT task annotations via the official `ittapi` crate (which links the static
# `ittnotify` C library, compiled from vendored source — no system dependency).
# Implemented in `src/itt.rs` with NO `unsafe` in this crate: all FFI is confined
# to `ittapi`, so `forbid(unsafe_code)` stays active for this feature. When no
# ITT collector (VTune) is attached, every annotation is an inert stub.
itt = ["dep:ittapi"]
# OpenTelemetry export (stretch, §48.8.6). Declared as an empty capability flag
# for the same offline/deferred reasons as `itt`; becomes
# `otel = ["dep:opentelemetry"]` when implemented.
otel = []
# CUPTI GPU kernel tracing (§48.8.3/§49). CUPTI is dlopen'd at runtime via
# `libloading` (no link-time dependency on libcupti), so a build with this
# feature still runs on machines without an NVIDIA driver — the collector
# degrades to `available == false`. Implemented in `src/cupti.rs`; this is the
# only module allowed to use `unsafe` (see the crate-level attribute in lib.rs).
cupti = ["dep:libloading"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
# Perfetto protobuf serialization. Pure Rust, no `protoc` required — the trace
# schema subset is hand-written with `#[derive(prost::Message)]`.
prost = { version = "0.13", optional = true }
# Runtime dlopen/dlsym of libcupti for the `cupti` feature. Pure Rust, no
# link-time CUDA dependency; only pulled in when `cupti` is enabled.
libloading = { version = "0.8", optional = true }
# Intel ITT (VTune/Inspector) task annotations for the `itt` feature. Links the
# static `ittnotify` C library (built from vendored source by `ittapi-sys` via
# `cc`, no system/`protoc` dependency); only pulled in when `itt` is enabled. The
# crate exposes a safe API, so this crate needs no `unsafe` of its own.
ittapi = { version = "0.5", optional = true }

[dev-dependencies]
# Used only by the `perfetto` feature's export test to decode and validate the
# emitted `Trace` protobuf. Not part of the library's dependency surface.
prost = "0.13"
