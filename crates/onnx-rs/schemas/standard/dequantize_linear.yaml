domain: ""
name: DequantizeLinear
since_version: 21
doc: Linearly dequantize a tensor using per-tensor, per-axis, or blocked quantization.
attributes:
  - { name: axis, type: int, default: 1 }
  - { name: block_size, type: int, default: 0 }
inputs:
  - { name: x, type_str: T1 }
  - { name: x_scale, type_str: T2 }
  - { name: x_zero_point, type_str: T1, optional: true }
outputs:
  - { name: y, type_str: T2 }
type_constraints:
  - { type_param: T1, allowed: [int8, uint8, int16, uint16, int32, float8e4m3fn, float8e4m3fnuz, float8e5m2, float8e5m2fnuz, uint4, int4] }
  - { type_param: T2, allowed: [float32, float16, bfloat16] }
