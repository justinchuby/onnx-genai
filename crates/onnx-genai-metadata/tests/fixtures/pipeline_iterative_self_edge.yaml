pipeline:
  models:
    denoiser:
      filename: denoiser.onnx
      type: denoiser
    vae:
      filename: vae.onnx
      type: vae
  dataflow:
    # Loop-carried self-edge: the denoiser is fed its own previous-step output.
    - from: denoiser.denoised
      to: denoiser.sample
      dtype: fp32
    - from: denoiser.denoised
      to: vae.latent
      dtype: fp32
  strategy:
    kind: iterative
    denoiser: denoiser
    num_steps: 20
    guidance_scale: 7.5
  phases:
    vae:
      run_on: final_only
