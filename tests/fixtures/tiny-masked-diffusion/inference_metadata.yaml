pipeline:
  models:
    denoiser:
      filename: lm.onnx.textproto
      type: denoiser
  dataflow:
    - from: denoiser.logits
      to: denoiser.input_ids
  strategy:
    kind: iterative
    denoiser: denoiser
    num_steps: 4
    scheduler_config:
      kind: masked_diffusion
      mask_token_id: 1
