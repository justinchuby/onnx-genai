required_capabilities:
  - kv_cache
  - grouped_query_attention

model:
  attention:
    type: grouped_query
    num_kv_heads: 8
    num_attention_heads: 32
    head_dim: 128
    sliding_window: null
  max_sequence_length: 131072
  runtime_configurable:
    kv_cache:
      dtype: [fp16, fp8_e5m2]
    prefix_cache: true
    continuous_batching: true

kv_cache:
  native_dtype: bf16
  quantization_tolerance:
    key:
      default: fp8_e5m2
      per_layer:
        - layers: [0, 1]
          min_precision: fp16
        - layers: [-1]
          min_precision: fp16
      quantization_axis: per_channel
    value:
      default: fp8_e4m3
      per_layer:
        - layers: [0, 1, -1]
          min_precision: fp16
      quantization_axis: per_token
  sensitive_layers: [0, 1, -1]
  operations:
    rewind_safe: true
    fork_precision_policy: inherit
    checkpoint_serializable: true

strategy:
  kind: speculative
  draft:
    producer: ngram
  acceptance: greedy
  tokens_per_step: 5
  topology: linear
  performance_hints:
    expected_acceptance_rate: 0.6
    optimal_k: 4

structured_output:
  supported_formats:
    - json_schema
    - regex
    - context_free_grammar
  training_format: chatml_tool_call
  stop_sequences:
    - "</tool_call>"
    - "```"

hardware_requirements:
  min_memory_gb: 4.2
  required_dtypes: [fp16]
  beneficial_dtypes: [fp8_e4m3]
  kv_cache_memory_per_1k_tokens_mb: 128
