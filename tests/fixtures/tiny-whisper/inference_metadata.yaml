pipeline:
  models:
    encoder:
      filename: encoder.onnx.textproto
      type: encoder
    decoder:
      filename: decoder.onnx.textproto
      type: decoder
      tokenizer: tokenizer.json
  dataflow:
    - from: encoder.encoder_hidden_states
      to: decoder.encoder_hidden_states
      dtype: fp32
      device_transfer: false
  strategy:
    kind: composite
    stages:
      - name: encode_audio
        strategy:
          kind: single_pass
          model: encoder
        run_on: prompt_only
      - name: decode_transcript
        strategy:
          kind: autoregressive
          decoder: decoder
          max_tokens: 4
        run_on: every_step
  phases:
    encoder:
      run_on: prompt_only
    decoder:
      run_on: every_step
